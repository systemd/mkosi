rebuild:
  steps:
    - trigger_services:
        project: system:systemd
        package: mkosi
  filters:
    event: push
    branches:
      only:
        - main
ci:
  steps:
    - branch_package:
        source_project: system:systemd
        source_package: mkosi
        target_project: system:systemd:ci
  filters:
    event: pull_request
    branches:
      only:
        - main
