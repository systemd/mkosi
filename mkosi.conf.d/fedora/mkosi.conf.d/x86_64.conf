[Match]
Architecture=x86-64

[Content]
# kernel-uki-virt ships a pre-built UKI for virtual machines, needed to test
# Bootloader=uki-prebuilt. Kept in arch-specific configs (not fedora/mkosi.conf)
# because the package is not available on all Fedora architectures (e.g. ppc64le).
Packages=
        amd-ucode-firmware
        kernel-uki-virt
        shim-unsigned-x64
